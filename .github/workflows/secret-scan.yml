name: Secret scan

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  python-secret-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan tracked files for secret patterns
        run: |
          python3 - <<'PY'
          import subprocess
          from pathlib import Path
          import sys
          sys.path.insert(0, "scripts")
          from check_secrets import scan_content, is_forbidden_path

          tracked = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          failures = []
          for path in tracked:
              reason = is_forbidden_path(path)
              if reason:
                  failures.append(reason)
                  continue
              try:
                  content = Path(path).read_text(encoding="utf-8", errors="replace")
              except OSError as exc:
                  failures.append(f"could not read `{path}`: {exc}")
                  continue
              failures.extend(scan_content(path, content))

          if failures:
              print("Secret scan failed on tracked files:", file=sys.stderr)
              for item in failures:
                  print(f"  - {item}", file=sys.stderr)
              sys.exit(1)
          print(f"OK: scanned {len(tracked)} tracked files")
          PY
