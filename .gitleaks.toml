title = "CHF gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Safe templates and docs that mention key names without values, plus comment-only or placeholder env lines"
regexTarget = "line"
paths = [
  '''\.env\.example$''',
  '''docs/API_KEYS_AND_DATA_SOURCES\.md''',
  '''docs/SECURITY\.md''',
  '''scripts/check_secrets\.py''',
  '''README\.md''',
]
regexes = [
  '''(?m)^\s*#\s*.*(?:API_KEY|SECRET|TOKEN|PASSWORD)''',
  '''(?m)^\s*(?:COINGECKO|BINANCE|COINMETRICS|DEFILLAMA|COINMARKETCAP|ETHERSCAN|GRAPH)_API_KEY=\s*(?:#.*)?$''',
]
