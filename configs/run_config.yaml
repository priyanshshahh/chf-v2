  output_partitioned: true

labels_pit:
  # Survivorship-free PIT handoff: the modeling set is membership-masked (each coin counts
  # only in months it was actually a top-100 member), so it is far sparser than the legacy
  # dense universe the base floors (50k) were tuned for. Floors lowered to sanity levels;
  # the manifest reports the real achieved coverage. Integrity note: less data makes alpha
  # HARDER to verify, so the negative headline stays conservative.
  min_symbols_required: 50
  min_label_rows_required: 5000
  min_rows_per_horizon_required: 5000
  min_common_rows_all_horizons: 5000

