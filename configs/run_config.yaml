onchain_pit:
  # Survivorship-free on-chain ingest: fetch every coin ever eligible (incl. dead coins).
  #   python main.py onchain --section onchain_pit
  universe_membership_mode: union_full_history
  min_history_days_policy: membership_aware
  min_history_days_floor: 90
  refuse_ambiguous_ticker_resolution: true

onchain:
  research_mode: true
  live_api_enabled: true
  use_fixtures: false
  max_assets: null
  # Phase 1 (PIT collapse fix): latest_snapshot (legacy) | union_full_history (fetch every
  # coin ever eligible, incl. since-delisted, so dead coins get on-chain coverage in PIT mode).
  universe_membership_mode: latest_snapshot
  # Phase 3 (#3): drop look-ahead-unsafe metrics. DeFiLlama pool_tvl_usd/pool_apy are the
  # CURRENT snapshot stamped onto a past date (today's value at t) — quarantined by default.
  lookahead_unsafe_metrics: [pool_tvl_usd, pool_apy]
  # Phase 2 (#2): refuse reused-ticker assets (one symbol → >1 cmc_id) rather than risk
  # attaching the currently-live coin's on-chain data to a different historical coin.
  refuse_ambiguous_ticker_resolution: true
  # Phase 4 (#5): membership-aware history floor for short-lived (delisted) coins.
  min_history_days_policy: absolute             # absolute | membership_aware
  min_history_days_floor: 90
  # Phase 5 (#7,#8): determinism + bounded provider cooldown.
  as_of_date: null                              # pin e.g. "2026-03-24" for reproducible window
  provider_cooldown_seconds: 60                 # bounded rate-limit cooldown (was run-global blacklist)
