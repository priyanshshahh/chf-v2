features_pit:
  # Survivorship-free feature generation over the full PIT panel:
  #   python main.py features --section features_pit
  membership_mode: pit_daily
  require_pit_membership: true
  membership_daily_path: "data/raw/universe/universe_membership_daily.parquet"
  # PIT-appropriate coverage thresholds. The production (latest-survivor) thresholds
  # (90/40/90/50000) would FAIL a survivorship-free run: dead coins legitimately have no
  # on-chain data, so on-chain symbol coverage is genuinely lower (and is NOT a data-quality
  # failure). On-chain floor is aligned with OnChainAgent's minimum_assets_with_any_onchain (15).
  # Re-tune against the first real PIT run; these are conservative floors, not silenced checks.
  min_market_symbols_required: 50
  min_onchain_symbols_required: 15
  min_full_feature_symbols_required: 50
  min_rows_required: 20000

features:
  research_mode: true
  input_market_path: "data/raw/market/market_ohlcv.parquet"
  input_onchain_wide_path: "data/raw/onchain/onchain_wide.parquet"
  input_onchain_observations_path: "data/raw/onchain/onchain_observations.parquet"
  input_universe_path: "data/raw/universe/universe_monthly.parquet"
  input_market_manifest_path: "data/raw/market/market_manifest.json"
  input_onchain_manifest_path: "data/raw/onchain/onchain_manifest.json"
  output_dir: "data/features"
  use_duckdb: true
  # --- Point-in-time universe membership (Phase 1) ---
  # latest_snapshot : legacy — build features for today's eligible survivors only
  # pit_daily       : build over the full union panel, emit only true per-day member rows
  membership_mode: latest_snapshot
  membership_daily_path: "data/raw/universe/universe_membership_daily.parquet"
  require_pit_membership: false
  fail_on_missing_inputs: true
  fail_on_empty_output: true
  fail_on_duplicate_symbol_date: true
  fail_on_target_leakage: true
  fail_on_future_leakage: true
  fail_on_all_null_feature: true
  fail_on_low_feature_coverage: true
  min_market_symbols_required: 90
  min_onchain_symbols_required: 40
  min_full_feature_symbols_required: 90
  min_rows_required: 50000
  market_windows:
    returns: [1, 3, 7, 14, 30, 60, 90]
    volatility: [7, 14, 30, 60]
    volume: [7, 14, 30, 60]
    skewness: [30]
    beta: [60]
    atr: [14]
    drawdown: [30, 90]
  onchain_windows:
    growth: [7, 14, 30, 90]
    smoothing: [30, 90]
    zscore: [30, 90]
  onchain_lag_days: 1
  market_feature_policy: "completed_daily_candle"
  onchain_feature_policy: "lagged_asof"
  winsorization:
    enabled: true
    method: "cross_sectional_by_date"
    lower_quantile: 0.01
    upper_quantile: 0.99
  cross_sectional_zscore:
    enabled: true
    group_by: "date_ts"
    min_assets_per_date: 10
  missingness:
    add_missing_indicators: true
    add_onchain_coverage_flags: true
    max_null_pct_feature: 0.95
  pruning:
    enabled: true
    correlation_method: "spearman"
    correlation_threshold: 0.85
    vif_enabled: true
    vif_threshold: 10.0
    max_final_features: 60
    min_final_features: 20
    keep_unpruned_outputs: true
  feature_versions:
    market: "market_v1"
    onchain: "onchain_v1"
    full: "full_v1"

features_smoke:
  research_mode: true
  output_dir: "data/features_smoke"
  max_symbols: 10
  min_market_symbols_required: 5
  min_onchain_symbols_required: 2
  min_full_feature_symbols_required: 5
  min_rows_required: 1000
  use_duckdb: true
  fail_on_missing_inputs: true
  fail_on_empty_output: true
  onchain_lag_days: 1

