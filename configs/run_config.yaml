# CHF — Mini Hedge Fund Crypto Portfolio
# Master Run Configuration
# All parameters are config-driven for full reproducibility.

project:
  name: "CHF"
  version: "1.0.0"
  description: "Mini Hedge Fund Crypto Portfolio with ML/AI, Vectorized Backtesting & Agent Automation"
  seed: 42

paths:
  data_root: "data"
  raw: "data/raw"
  staged: "data/staged"
  cleaned: "data/cleaned"
  features: "data/features"
  labels: "data/labels"
  predictions: "data/predictions"
  allocations: "data/allocations"
  backtests: "data/backtests"
  reports: "data/reports"
  artifacts: "artifacts"
  metadata: "metadata"
  mlruns: "mlruns"

universe:
  research_mode: true
  live_api_enabled: true
  use_fixtures: false
  provider_priority:
    - coingecko
    - coinpaprika
    - coincap
    - cryptocompare
  candidate_n: 500
  final_universe_n: 100
  minimum_eligible_n: 50
  snapshot_frequency: monthly
  snapshot_day: 1
  start_date: "2021-01-01"
  end_date: null
  vs_currency: usd
  exclude_stablecoins: true
  exclude_wrapped: true
  exclude_bridged: true
  exclude_lst: true
  exclude_synthetic_pegged: true
  require_365d_maturity: true
  require_exchange_tradability: true
  exchange_tradability_sources:
    - coinbase
    - kraken
  require_onchain_coverage: true
  onchain_coverage_sources:
    - coinmetrics
    - defillama
  cache_enabled: true
  force_refresh: false
  request_timeout_seconds: 30
  min_seconds_between_requests: 2.0
  max_retries: 5
  backoff_base_seconds: 3
  backoff_jitter_seconds: 1.5
  fail_on_empty_month: true
  fail_on_low_eligible_count: true
  fail_on_demo_data: true
  fail_on_provider_exhaustion: true
  output_dir: "data/raw/universe"
  cache_dir: "data/cache"
  require_true_historical_rankings: false
  allow_current_ranking_for_recent_snapshot_only: true
  allow_latest_snapshot_only: true
  # Backward-compatible aliases for older code paths.
  top_n: 100
  rebalance_frequency: "monthly"
  min_history_days: 365
  min_daily_volume_usd: 1_000_000

universe_dev:
  research_mode: true
  live_api_enabled: false
  use_fixtures: true
  candidate_n: 25
