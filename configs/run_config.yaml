onchain_smoke:
  research_mode: true
  live_api_enabled: true
  use_fixtures: false
  max_assets: 5
  backfill_days: 365
  min_history_days: 90
  minimum_assets_with_any_onchain: 2
  minimum_total_metric_observations: 100
  minimum_assets_with_defillama: 1
  minimum_defillama_observations: 30
  cache_enabled: true
  force_refresh: false
  cache_dir: "data/cache/onchain"
  output_dir: "data/raw/onchain"
  request_timeout_seconds: 30
  min_seconds_between_requests: 1.0
  max_retries: 3
  backoff_base_seconds: 3
  backoff_jitter_seconds: 1.5
  per_asset_timeout_seconds: 90
  drop_incomplete_current_day: true
  fail_on_empty_output: true
  fail_on_low_coverage: true
  fail_on_demo_data: true
  provider_priority:
    - coinmetrics
    - defillama
    - etherscan
    - thegraph
    - blockchair
    - dune
  coinmetrics:
    enabled: true
    required: false
    base_url: "https://community-api.coinmetrics.io/v4"
    rate_limit_requests: 10
    rate_limit_seconds: 6
    metrics:
      - AdrActCnt
      - TxCnt
      - CapRealUSD
      - CapMVRVCur
      - NVTAdj
      - FeeTotUSD
      - TxTfrValAdjUSD
      - SplyCur
      - CapMrktCurUSD
      - IssTotUSD
  defillama:
    enabled: true
    required: false
    base_url: "https://api.llama.fi"
    metrics:
      - chain_tvl_usd
      - protocol_tvl_usd
      - fees_usd
      - revenue_usd
      - dex_volume_usd
      - stablecoin_mcap_usd
      - pool_tvl_usd
      - pool_apy
  etherscan:
    enabled: true
    required: false
    env_key: "ETHERSCAN_API_KEY"
    base_url: "https://api.etherscan.io/v2/api"
    only_if_key_present: true
    rate_limit_per_second: 3
    chains:
      ETH:
        chainid: 1
        chain_name: "Ethereum"
      BNB:
        chainid: 56
        chain_name: "BNB Smart Chain"
      AVAX:
        chainid: 43114
        chain_name: "Avalanche C-Chain"
      MNT:
        chainid: 5000
        chain_name: "Mantle"
    metrics:
      - gas_used
      - transaction_count_proxy
      - token_transfer_count_proxy
  thegraph:
    enabled: true
    required: false
    env_key: "GRAPH_API_KEY"
    only_if_key_present: true
    rate_limit_per_minute: 200
    configured_subgraphs: {}
    metrics:
      - protocol_volume_usd
      - protocol_tvl_usd
      - protocol_fees_usd
  blockchair:
    enabled: false
    required: false
    base_url: "https://api.blockchair.com"
    chains: {}
    metrics:
      - chain_transaction_count
      - chain_output_volume
      - chain_fee_total
  dune:
    enabled: false
    required: false
    env_key: "DUNE_API_KEY"
    only_if_key_present: true
    query_ids: {}
    metrics:
      - curated_protocol_metric

