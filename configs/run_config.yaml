modeling:
  research_mode: true
  input_path: "data/labels/modeling_dataset.parquet"
  horizons: [7, 14, 30]
  model_names:
    - baseline_cross_sectional_mean
  feature_sets:
    - market_only
    - market_plus_onchain
  default_feature_set: "market_plus_onchain"
  default_model: "lightgbm"
  use_pruned_features: true
  fail_on_empty_output: true
  fail_on_no_valid_folds: true
  fail_on_leakage: true
  min_prediction_rows: 1000
  min_test_symbols_per_date: 10
  random_seed: 42
  compute_shap: true                  # SHAP TreeExplainer feature importance for tree models (non-fatal, deterministic)
  shap_max_samples: 2000              # cap test rows per fold for SHAP (first-N, deterministic; 0 = all rows)
  walk_forward:
    initial_train_days: 504
    test_days: 30
    step_days: 30
    purge_days: null
    embargo_days: 30
    min_train_rows: 1000
    min_test_rows: 100
    min_test_symbols: 10
  random_forest:
    n_estimators: 60
    max_depth: 5
    min_samples_leaf: 20
    max_features: 0.5
    n_jobs: -1
  lightgbm:
    n_estimators: 120
    learning_rate: 0.03
    max_depth: 5
    num_leaves: 31
    min_child_samples: 30
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0
    objective: "regression"
    n_jobs: -1
    verbose: -1

modeling_smoke:
  research_mode: true
  max_symbols: 10
  horizons: [7]
  model_names:
    - baseline_cross_sectional_mean
    - random_forest
  feature_sets:
    - market_only
    - market_plus_onchain
  walk_forward:
    initial_train_days: 180
    test_days: 30
    step_days: 30
    purge_days: null
    embargo_days: 30
    min_train_rows: 200
    min_test_rows: 20
    min_test_symbols: 3
  random_forest:
    n_estimators: 75
    max_depth: 5
    min_samples_leaf: 20
    max_features: 0.5
    n_jobs: -1

