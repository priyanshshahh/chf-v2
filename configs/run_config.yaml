market_data:
  research_mode: true
  live_api_enabled: true
  use_fixtures: false
  max_assets: null
  exchange_priority:
    - coinbase
    - kraken
    - kucoin
    - gemini
  fallback_provider_priority:
    - cryptocompare
    - coingecko
    - coincap
    - coinpaprika
  quote_currency: "USD"
  allow_usdt_fallback: false
  timeframe: "1d"
  backfill_days: 2000
  min_history_days: 365
  minimum_assets_required: 50
  maximum_failed_assets_allowed: 50
  cache_enabled: true
  force_refresh: false
  cache_dir: "data/cache/market"
  request_timeout_seconds: 30
  per_asset_timeout_seconds: 180
  max_pages_per_asset: 20
  max_rows_per_asset: 3000
  min_seconds_between_requests: 1.5
  max_retries: 5
  backoff_base_seconds: 3
  backoff_jitter_seconds: 1.5
  drop_incomplete_current_day: true
  forward_fill_missing_days: true
  set_filled_volume_to_zero: true
  log_each_asset: true
  log_each_provider_attempt: true
  fail_on_low_coverage: true
  fail_on_empty_output: true
  fail_on_binance_usage: true
  fail_on_demo_data: true
  # --- Point-in-time universe handoff (Phase 1) ---
  # latest_snapshot  : legacy behavior — fetch only today's eligible survivors (survivorship-biased)
  # union_full_history: fetch every coin ever eligible across all snapshots (survivorship-free)
  universe_membership_mode: latest_snapshot
  attach_membership_mask: false                 # join is_universe_member/market_cap_rank onto output
  membership_daily_path: "data/raw/universe/universe_membership_daily.parquet"
  require_pit_membership: false                 # hard-fail if union mode but mask missing (no silent survivor fallback)
  # --- Determinism (Phase 4) ---
  as_of_date: null                              # pin to e.g. "2026-03-24" for reproducible window + current-day cutoff
  provider_cooldown_seconds: 60                 # bounded rate-limit cooldown (was: run-global blacklist)
  # --- Price-anomaly guard (Phase 5, hardened in Phase 9) ---
  max_abs_daily_log_return: 1.6094379124341003  # ln(5) ≈ +400%/day; both-legs-huge round trip
  anomaly_secondary_log_return: 0.9162907318741551  # ln(2.5); round-trip-to-origin leg (catches moderate bad prints)
  anomaly_roundtrip_tolerance: 0.15            # next close must return within 15% of the pre-spike close
  anomaly_policy: flag_only                     # flag_only | drop | winsorize (winsorized bars marked synthetic)
  # --- Stale-price (frozen-feed) detection (Phase 9) ---
  max_flat_close_days: 10                        # runs of an identical REAL close longer than this → is_stale_price
  # --- Storage & access (Phase 6) ---
  write_partitioned_market: true                # also write partitioned/symbol=…/year=… (flat file always written too)
  # --- Gap & history policy (Phase 8: F, G) ---
  long_gap_policy: reject_asset                 # reject_asset (legacy) | segment_and_flag (keep most-recent contiguous segment)
  min_history_days_policy: absolute             # absolute (legacy 365) | membership_aware (use min_history_days_floor)
  min_history_days_floor: 90                     # floor used when membership_aware (keeps short-lived dead coins)

market_data_pit:
  # Convenience section to run the survivorship-free handoff end to end:
  #   python main.py market --section market_data_pit
  # Build the daily mask first: python scripts/build_membership_daily.py --end 2026-06-30
  universe_membership_mode: union_full_history
  attach_membership_mask: true
  require_pit_membership: true
  membership_daily_path: "data/raw/universe/universe_membership_daily.parquet"
  # Survivorship-free ingestion keeps dead/short-lived members with real (segmented) history.
  long_gap_policy: segment_and_flag
  min_history_days_policy: membership_aware
  min_history_days_floor: 90
  # Widen the keyless exchange waterfall to maximize dead-coin coverage (all non-Binance,
  # USD/USDC). Fallback aggregators (CryptoCompare/CoinGecko) still backstop delisted coins.
  exchange_priority: [coinbase, kraken, kucoin, gemini, bitstamp, bitfinex]
  # Most alts (and many delisted coins) only have USDT pairs on non-Binance venues. Allow
  # SYM/USDT resolution (USDT~USD) to recover them; Binance stays forbidden. Pricing basis
  # for USDT-sourced assets is USDT — documented as a research caveat.
  allow_usdt_fallback: true
  # Free-data coverage ceiling: after the exchange+USDT+aggregator waterfall, ~85 of 320
  # union coins remain unfetchable (truly-dead coins + exchange-native tokens like HT/GT/OKB
  # with no free OHLCV). Accept that residual as a documented price-data survivorship caveat
  # (membership stays survivorship-free). Coverage achieved: ~235/320.
  maximum_failed_assets_allowed: 95

